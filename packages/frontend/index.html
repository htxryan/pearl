<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Pearl</title>
    <script>
      // Boot script: apply theme before first paint to prevent FOTC.
      // Reads cached theme data from localStorage (written by useTheme hook).
      // Must run synchronously before any rendering occurs.
      (function () {
        try {
          var cache = localStorage.getItem("pearl-theme-cache");
          if (cache) {
            var data = JSON.parse(cache);
            var root = document.documentElement;
            if (data.colorScheme === "dark") {
              root.classList.add("dark");
            }
            if (data.colors) {
              var validTokens = ["background","foreground","card","card-foreground","popover","popover-foreground","primary","primary-foreground","secondary","secondary-foreground","muted","muted-foreground","accent","accent-foreground","destructive","border","input","ring","chart-1","chart-2","chart-3","chart-4","chart-5","info","info-foreground","success","success-foreground","warning","warning-foreground","danger","danger-foreground","surface","surface-raised"];
              for (var i = 0; i < validTokens.length; i++) {
                if (data.colors[validTokens[i]]) {
                  root.style.setProperty("--" + validTokens[i], data.colors[validTokens[i]]);
                }
              }
            }
          } else {
            // No cache — check system preference for .dark class only.
            // CSS defaults handle colors until React loads.
            if (window.matchMedia && window.matchMedia("(prefers-color-scheme: dark)").matches) {
              document.documentElement.classList.add("dark");
            }
          }
        } catch (e) {
          // localStorage unavailable or corrupt — CSS defaults will apply.
        }
      })();
    </script>
  </head>
  <body>
    <div id="root"></div>
    <script type="module" src="/src/main.tsx"></script>
  </body>
</html>
